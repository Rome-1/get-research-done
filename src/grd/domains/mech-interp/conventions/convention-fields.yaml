# Mechanistic interpretability convention fields
# Each field defines a methodology or notation choice that should be locked
# per-project to prevent drift across experiments and analyses.

fields:
  - name: model_family
    label: "Model family"
    description: "Target model architecture family (transformer, MLP, CNN, SSM)"
    aliases: ["model"]
    value_aliases:
      "gpt": "transformer"
      "gpt2": "transformer"
      "llama": "transformer"
      "bert": "transformer"
      "vit": "vision-transformer"

  - name: activation_space
    label: "Activation space"
    description: "Whether analysis uses neuron basis, residual stream, or learned feature basis"
    aliases: ["basis", "space"]
    value_aliases:
      "neuron": "neuron-basis"
      "neurons": "neuron-basis"
      "residual": "residual-stream"
      "resid": "residual-stream"
      "feature": "learned-basis"
      "sae": "learned-basis"
      "svd": "svd-basis"
      "pca": "pca-basis"

  - name: patching_method
    label: "Patching method"
    description: "Activation patching variant (zero, mean, resample, noising, denoising)"
    aliases: ["patching"]
    value_aliases:
      "zero_ablation": "zero-ablation"
      "mean_ablation": "mean-ablation"
      "resample_ablation": "resample-ablation"
      "activation_patching": "denoising"
      "causal_scrubbing": "resample-ablation"

  - name: attribution_method
    label: "Attribution method"
    description: "Method for computing feature importance or component contribution"
    aliases: ["attribution"]
    value_aliases:
      "ig": "integrated-gradients"
      "integrated_gradients": "integrated-gradients"
      "grad_x_act": "gradient-times-activation"
      "direct_logit": "direct-logit-attribution"
      "dla": "direct-logit-attribution"

  - name: sae_architecture
    label: "SAE architecture"
    description: "Sparse autoencoder variant (vanilla, top-k, Gated, JumpReLU)"
    aliases: ["sae_type", "sae_variant"]
    value_aliases:
      "vanilla": "relu-sae"
      "standard": "relu-sae"
      "gated": "gated-sae"
      "jumprelu": "jumprelu-sae"
      "topk": "topk-sae"
      "top_k": "topk-sae"

  - name: sae_normalization
    label: "SAE normalization"
    description: "How activations are normalized before SAE training (layer norm, none, centered)"
    aliases: ["sae_norm"]

  - name: hook_point_convention
    label: "Hook point convention"
    description: "Naming convention for model hook points (TransformerLens, nnsight, custom)"
    aliases: ["hooks"]
    value_aliases:
      "tl": "transformer-lens"
      "transformerlens": "transformer-lens"
      "nnsight": "nnsight"

  - name: layer_indexing
    label: "Layer indexing"
    description: "Layer numbering convention (0-indexed vs 1-indexed, embed as layer 0 or not)"
    aliases: ["indexing"]
    value_aliases:
      "0-indexed": "zero-indexed"
      "1-indexed": "one-indexed"

  - name: logit_attribution_direction
    label: "Logit attribution direction"
    description: "Whether logit attribution uses logit difference, log-prob, or raw logit"
    aliases: ["logit_metric"]
    value_aliases:
      "logit_diff": "logit-difference"
      "log_prob": "log-probability"
      "prob": "probability"

  - name: position_encoding
    label: "Position encoding"
    description: "Whether positional embeddings are folded into residual stream analysis"
    aliases: ["pos_embed"]

  - name: attention_pattern_format
    label: "Attention pattern format"
    description: "How attention patterns are stored and visualized (softmax output, pre-softmax logits)"
    aliases: ["attn_format"]
    value_aliases:
      "post_softmax": "attention-weights"
      "pre_softmax": "attention-logits"
      "qk": "attention-logits"

  - name: feature_density_metric
    label: "Feature density metric"
    description: "How feature activation frequency is measured (L0, firing rate, activation fraction)"
    aliases: ["density_metric"]

  - name: ablation_baseline
    label: "Ablation baseline"
    description: "Reference distribution for ablation experiments (zero, mean, corrupted, resampled)"
    aliases: ["baseline"]

  - name: circuit_completeness_criterion
    label: "Circuit completeness criterion"
    description: "Threshold for circuit faithfulness (e.g., recovers 95% of logit difference)"
    aliases: ["completeness"]

  - name: tokenizer
    label: "Tokenizer"
    description: "Tokenizer used for input processing (GPT-2 BPE, SentencePiece, tiktoken)"
    aliases: ["tok"]
